<svg width="2048" height="2048" viewBox="0 0 2048 2048" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <filter id="softGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="52" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="1 0 0 0 0.95  0 1 0 0 0.95  0 0 1 0 0.95  0 0 0 0.55 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="dropShadow" x="-35%" y="-35%" width="170%" height="170%">
      <feDropShadow dx="0" dy="36" stdDeviation="42" flood-color="#000000" flood-opacity="0.42"/>
    </filter>

    <filter id="glassBlur" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="0.25"/>
    </filter>

    <linearGradient id="chromeHorizontal" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f7f7f4"/>
      <stop offset="18%" stop-color="#ffffff"/>
      <stop offset="42%" stop-color="#a7a7a4"/>
      <stop offset="64%" stop-color="#f0f0ec"/>
      <stop offset="100%" stop-color="#777775"/>
    </linearGradient>

    <linearGradient id="chromeReverse" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#7c7c79"/>
      <stop offset="30%" stop-color="#f4f4f0"/>
      <stop offset="56%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#9a9a96"/>
    </linearGradient>

    <linearGradient id="glassFill" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.82"/>
      <stop offset="42%" stop-color="#e6e6e3" stop-opacity="0.50"/>
      <stop offset="100%" stop-color="#8c8c89" stop-opacity="0.38"/>
    </linearGradient>

    <linearGradient id="deepGlass" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.50"/>
      <stop offset="55%" stop-color="#bdbdba" stop-opacity="0.26"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.12"/>
    </linearGradient>

    <radialGradient id="aura" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.42"/>
      <stop offset="44%" stop-color="#ffffff" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="highlightBand" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.70"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0"/>
    </linearGradient>

    <clipPath id="roundedClip">
      <rect x="0" y="0" width="560" height="820" rx="70"/>
    </clipPath>
  </defs>

  <!-- transparent canvas; object-only hero asset -->
  <g id="strata-sa-digital-architecture-engine" filter="url(#dropShadow)">
    <!-- broad aura -->
    <ellipse cx="1040" cy="1070" rx="720" ry="760" fill="url(#aura)" opacity="0.95"/>

    <!-- rear glass architecture planes -->
    <g opacity="0.72">
      <rect x="615" y="540" width="470" height="980" rx="84" fill="url(#deepGlass)" stroke="#ffffff" stroke-opacity="0.42" stroke-width="2" transform="rotate(-15 850 1030)"/>
      <rect x="965" y="510" width="540" height="1010" rx="90" fill="url(#deepGlass)" stroke="#ffffff" stroke-opacity="0.36" stroke-width="2" transform="rotate(13 1235 1015)"/>
      <rect x="750" y="580" width="610" height="900" rx="78" fill="url(#deepGlass)" stroke="#ffffff" stroke-opacity="0.30" stroke-width="2" transform="rotate(-2 1055 1030)"/>
    </g>

    <!-- chrome S silhouette: segmented engineered browser-frame arms -->
    <g filter="url(#softGlow)">
      <rect x="425" y="560" width="820" height="145" rx="72.5" fill="url(#chromeHorizontal)" stroke="#ffffff" stroke-opacity="0.75" stroke-width="3" transform="rotate(-5 835 632.5)"/>
      <rect x="565" y="900" width="760" height="132" rx="66" fill="url(#chromeReverse)" stroke="#ffffff" stroke-opacity="0.62" stroke-width="3" transform="rotate(14 945 966)"/>
      <rect x="390" y="1260" width="850" height="145" rx="72.5" fill="url(#chromeHorizontal)" stroke="#ffffff" stroke-opacity="0.78" stroke-width="3" transform="rotate(-6 815 1332.5)"/>
    </g>

    <!-- right A-frame: architectural chrome struts -->
    <g filter="url(#softGlow)">
      <rect x="1210" y="550" width="126" height="980" rx="63" fill="url(#chromeHorizontal)" stroke="#ffffff" stroke-opacity="0.72" stroke-width="3" transform="rotate(-27 1273 1040)"/>
      <rect x="1445" y="780" width="116" height="710" rx="58" fill="url(#chromeReverse)" stroke="#ffffff" stroke-opacity="0.68" stroke-width="3" transform="rotate(30 1503 1135)"/>
      <rect x="1110" y="1320" width="620" height="102" rx="51" fill="url(#chromeHorizontal)" stroke="#ffffff" stroke-opacity="0.70" stroke-width="3"/>
    </g>

    <!-- foreground web-interface slab -->
    <g transform="rotate(4 1048 1054)">
      <rect x="748" y="642" width="600" height="835" rx="72" fill="url(#glassFill)" stroke="#ffffff" stroke-opacity="0.82" stroke-width="3"/>
      <rect x="780" y="682" width="536" height="760" rx="54" fill="#ffffff" opacity="0.07" stroke="#ffffff" stroke-opacity="0.24" stroke-width="2"/>
      <circle cx="808" cy="720" r="8" fill="#ffffff" opacity="0.40"/>
      <circle cx="836" cy="720" r="8" fill="#ffffff" opacity="0.32"/>
      <circle cx="864" cy="720" r="8" fill="#ffffff" opacity="0.26"/>
      <rect x="925" y="710" width="290" height="18" rx="9" fill="#ffffff" opacity="0.20"/>
      <rect x="828" y="835" width="405" height="16" rx="8" fill="#ffffff" opacity="0.22"/>
      <rect x="828" y="895" width="305" height="16" rx="8" fill="#ffffff" opacity="0.16"/>
      <rect x="828" y="955" width="445" height="16" rx="8" fill="#ffffff" opacity="0.16"/>
      <rect x="828" y="1070" width="210" height="16" rx="8" fill="#ffffff" opacity="0.15"/>
      <rect x="828" y="1130" width="385" height="16" rx="8" fill="#ffffff" opacity="0.14"/>
      <rect x="828" y="1190" width="275" height="16" rx="8" fill="#ffffff" opacity="0.14"/>
      <path d="M738 715 L1320 610 L1370 725 L785 830 Z" fill="url(#highlightBand)" opacity="0.22"/>
    </g>

    <!-- black precision joints and structural details -->
    <g opacity="0.95">
      <circle cx="610" cy="850" r="42" fill="#090909" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      <circle cx="1440" cy="830" r="32" fill="#090909" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      <circle cx="1490" cy="1290" r="38" fill="#090909" stroke="#ffffff" stroke-opacity="0.24" stroke-width="2"/>
      <circle cx="730" cy="1435" r="29" fill="#090909" stroke="#ffffff" stroke-opacity="0.22" stroke-width="2"/>
      <rect x="590" y="890" width="205" height="36" rx="18" fill="#090909" opacity="0.58" stroke="#ffffff" stroke-opacity="0.14"/>
      <rect x="1325" y="1176" width="210" height="38" rx="19" fill="#090909" opacity="0.50" stroke="#ffffff" stroke-opacity="0.14"/>
      <rect x="775" y="622" width="185" height="34" rx="17" fill="#090909" opacity="0.40" stroke="#ffffff" stroke-opacity="0.12"/>
    </g>

    <!-- fine blueprint connection lines -->
    <g fill="none" stroke="#ffffff" stroke-opacity="0.30" stroke-width="2">
      <path d="M610 850 C750 790 850 790 985 825"/>
      <path d="M1245 790 C1390 795 1500 855 1560 930"/>
      <path d="M725 1432 C925 1482 1175 1448 1325 1350"/>
      <path d="M1490 1290 C1370 1220 1250 1210 1145 1240"/>
    </g>

    <!-- small premium glints -->
    <g stroke="#ffffff" stroke-linecap="round">
      <path d="M690 630 L750 630" stroke-opacity="0.92" stroke-width="5"/>
      <path d="M720 600 L720 660" stroke-opacity="0.50" stroke-width="3"/>
      <path d="M1320 690 L1370 690" stroke-opacity="0.78" stroke-width="4"/>
      <path d="M1345 667 L1345 714" stroke-opacity="0.42" stroke-width="3"/>
      <path d="M1510 1248 L1555 1248" stroke-opacity="0.74" stroke-width="4"/>
      <path d="M1532 1226 L1532 1270" stroke-opacity="0.40" stroke-width="3"/>
    </g>
  </g>
</svg>